name: Debug dotenv
run-name: Debug dotenv (${{ github.event_name }})
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/debug_dotenv_parsing.yml
jobs:
  test_dotenv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./action-dotenv-input
        id: dotenv
        with:
          with_env: |
            FOO=foo
            BAR=bar
            SPACES="var with spaces"
            QUAZ=quaz
      - run: |
          echo "FOO=$FOO"
          echo "BAR=$BAR"
          echo "QUAZ=$QUAZ"
          echo "SPACES=$SPACES"
        env: ${{ fromJson(steps.dotenv.outputs.with_env_json) }}
